name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build-lint-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x

      - name: Restore all projects
        run: |
          dotnet restore McpMonorepo.sln
          for sln in $(find src -name '*.sln' -type f); do
            dotnet restore "$sln"
          done

      - name: Build all projects
        run: |
          dotnet build McpMonorepo.sln --configuration Release --no-restore
          for sln in $(find src -name '*.sln' -type f); do
            dotnet build "$sln" --configuration Release --no-restore
          done

      - name: Lint (format verification)
        run: dotnet format McpMonorepo.sln --verify-no-changes --verbosity diagnostic

      - name: Unit tests
        run: |
          dotnet test McpMonorepo.sln --configuration Release --no-build --verbosity normal
          for sln in $(find src -name '*.sln' -type f); do
            dotnet test "$sln" --configuration Release --no-build --verbosity normal
          done
